services:
  # Camoufox sidecar: custom Firefox + Xvfb + C++-level fingerprint injection
  # Exposes a Playwright-compatible WebSocket endpoint on port 1234
  # Set PROXY_URL=http://user:pass@host:port for residential proxy (recommended for production)
  camoufox:
    build:
      context: ./services/camoufox
    environment:
      - PROXY_URL=${PROXY_URL:-}
      - CAMOUFOX_PORT=1234
      - CAMOUFOX_WS_PATH=ws
    expose:
      - "1234"
    restart: unless-stopped

  # Development: mount source, interactive shell
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/__pycache__
      - playwright-cache:/home/crawler/.cache
    env_file: .env
    environment:
      - BROWSER_HEADLESS=true
      - DOCKER_CONTAINER=1
      - BROWSER_WS_URL=ws://camoufox:1234/ws
      - BROWSER_STORAGE_STATE=/app/states/auth_state.json
    depends_on:
      - camoufox
    working_dir: /app
    stdin_open: true
    tty: true

  # Production: code baked in, run task via CLI
  agent:
    build:
      context: .
      target: production
    env_file: .env
    environment:
      - BROWSER_HEADLESS=true
      - DOCKER_CONTAINER=1
      - BROWSER_WS_URL=ws://camoufox:1234/ws
      - BROWSER_STORAGE_STATE=/workspace/states/auth_state.json
    depends_on:
      - camoufox
    volumes:
      - agent-output:/workspace
      - ./states:/workspace/states:ro

  # One-shot test runner
  test:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/__pycache__
    env_file: .env
    environment:
      - BROWSER_WS_URL=ws://camoufox:1234/ws
    depends_on:
      - camoufox
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

volumes:
  playwright-cache:
  agent-output:
